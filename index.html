<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <input type="number" id="num1" required>
        <input type="number" id="num2" required>
        <button type="button" id="add">add</button>
        <button type="button" id="sub">subtract</button>
        <button type="button" id="mul">multiply</button>
        <button type="button" id="div">divide</button>
    <div id="ans"></div>
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script>

     const ans=document.getElementById('ans')
     const num1=document.getElementById('num1')
     const num2=document.getElementById('num2')

     const add=document.getElementById('add')
     const sub=document.getElementById('sub')
     const mul=document.getElementById('mul')
     const div =document.getElementById('div')
    add.addEventListener('click',async (e) => {
      const sum=await axios.post('http://localhost:3000/sum',
      {
        a:num1.value,
        b:num2.value
      });
       const sum2=sum.data.c;
       ans.innerHTML=sum2;

     })
    sub.addEventListener('click',async() => {
      const sub=await axios.post('http://localhost:3000/sub',
        {
          a:num1.value,
          b:num2.value
        }
      )
       const sub2=sub.data.c;
       ans.innerHTML=sub2;
    })
       mul.addEventListener('click',async() => {
      const mul=await axios.post('http://localhost:3000/mul',
        {
          a:num1.value,
          b:num2.value
        }
      )
       const mul2=mul.data.c;
       ans.innerHTML=mul2;
    })

    //   const div=await axios.post('http://localhost:3000/div',
    //     {
    //       a:num1.value,
    //       b:num2.value
    //     }
    //   )
    //    const div2=div.data.c;
    //    ans.innerHTML=div2;
    // })
    </script>
</body>
</html>
